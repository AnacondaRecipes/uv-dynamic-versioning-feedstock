{% set name = "uv-dynamic-versioning" %}
{% set version = "0.12.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name|replace("-", "_") }}-{{ version }}.tar.gz
  sha256: e853e0c5b2425a68005580325d4975a8c37b66015589ca45ef96e660fe0f8f16
build:
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  skip: true # [py<39]

requirements:
  host:
    - python
    - pip
    - hatchling
  run:
    - python
    - dunamai >=1.25,<2
    - hatchling >=1.26,<2
    - jinja2 >=3.0,<4
    - tomlkit >=0.13,<1

test:
  imports:
    - uv_dynamic_versioning
  source_files:
    - tests
    # pyproject.toml is explicitly used in the tests
    - pyproject.toml
  requires:
    - pip
    - git
    - pytest >=8.4.2,<8.5.0
    - gitpython >=3.1.45,<3.2.0
  commands:
    - pip check
    # The tests want a git repo to work in and assume they are in
    # $SRC_DIR -- we aren't so create one
    - git init .
    - git config user.email you@example.com
    - git config user.name "Your Name"
    - git add .
    - git commit -m "dummy commit"
    - pytest tests

about:
  home: https://github.com/ninoseki/uv-dynamic-versioning
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: Dynamic versioning based on VCS tags for uv/hatch project
  description: |
    poetry-dynamic-versioning influenced dynamic versioning tool for uv/hatch, powered by dunamai.
  doc_url: https://github.com/ninoseki/uv-dynamic-versioning
  dev_url: https://github.com/ninoseki/uv-dynamic-versioning

extra:
  recipe-maintainers:
    - ninoseki
    - tobiasraabe
